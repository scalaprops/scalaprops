name: CI
on:
  pull_request:
  push:
    branches:
      - master
  schedule:
  - cron: '0 6 * * 3'
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        name: [JVM, JS, Native]
        java: [11, 25]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: ${{matrix.java}}
        distribution: zulu
    - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v6.4.8
    - run: git config core.whitespace tab-in-indent,trailing-space,space-before-tab,cr-at-eol
    - run: git show --oneline --check
    - shell: bash
      name: install sbt
      run: curl -Ls https://raw.githubusercontent.com/dwijnand/sbt-extras/787e7a6c0523cbd995708aec2815a21917315079/sbt > ./sbt && chmod 0755 ./sbt
    - run: ./sbt -v
           -Dsbt.traces=true
           -jvm-opts .github/workflows/.jvmopts
           "all scalafmtCheckAll scalafmtSbtCheck"
           checkGenerateCodeError
           Test/compile
           scalapropsTestNames
           publishLocal
           "testSequential${{ matrix.name }}"
    - uses: xuwei-k/sbt-trace-action@v1
    - uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
      if: ${{ always() && matrix.name == 'JVM' }}
      with:
        report_paths: '**/test-reports/*.xml'
        require_tests: true
        check_name: "${{ matrix.java }}"
    - uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5
      if: ${{ always() && matrix.name == 'JVM' }}
      with:
        paths: '**/test-reports/*.xml'
    - run: rm -rf "$HOME/.ivy2/local"
  latest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        java-version: 25
        distribution: zulu
    - uses: coursier/cache-action@95e5b1029b6b86e7bac033ee44a0697d8a527d2d # v6.4.8
    - uses: sbt/setup-sbt@v1
    - run:
       sbt -v
       "++ 3.8.4!"
       genJVM3/test
       coreJVM3/test
       scalapropsJVM3/test
       scalazJVM3/test
